train_file:  ['/mrsach_dang_quoc_minh_101/workspace/pretrain_framework/RaSa/data/ICFG-PEDES/train.json']
val_file: '/mrsach_dang_quoc_minh_101/workspace/pretrain_framework/RaSa/data/ICFG-PEDES/test.json'
test_file: '/mrsach_dang_quoc_minh_101/workspace/pretrain_framework/RaSa/data/ICFG-PEDES/test.json'
train_image_root: '/mrsach_dang_quoc_minh_101/workspace/WS_DATASETS/REID/ICFG-PEDES/imgs'
val_image_root: '/mrsach_dang_quoc_minh_101/workspace/WS_DATASETS/REID/ICFG-PEDES/imgs'
test_image_root: '/mrsach_dang_quoc_minh_101/workspace/WS_DATASETS/REID/ICFG-PEDES/imgs'

# Mask directory (pre-computed .npy files from SegFormer)
mask_root: '/mrsach_dang_quoc_minh_101/workspace/pretrain_framework/RaSa/data/ICFG-PEDES/masks'

bert_config: 'configs/config_bert.json'

max_words: 50
image_res: 384
batch_size_train: 13
batch_size_test: 64

mlm_probability: 0.15
weak_pos_pair_probability: 0.1
mrtd_mask_probability: 0.3

queue_size: 65536
momentum: 0.995
vision_width: 768
embed_dim: 256
temp: 0.07
k_test: 128

# Memory Bank config (replaces queue for contrastive loss)
num_train_samples: 34674
bank_momentum: 0.9

alpha: 0.4
warm_up: True

# Part-level loss config
part_proj_dim: 256
part_temp: 0.07
part_loss_weight: 0.5

optimizer:
  opt: adamW
  lr: 0.00001
  weight_decay: 0.02
  lr_custm: 0.0001

schedular:
  sched: cosine
  lr: 0.00001
  epochs: 30
  min_lr: 0.000001
  decay_rate: 1
  warmup_lr: 0.00001
  warmup_epochs: 1
  cooldown_epochs: 0

eval_epoch: 10

# Weights for: loss_cl, loss_pitm, loss_mlm, loss_prd, loss_mrtd, loss_part
weights:
  - 0.5
  - 1
  - 1
  - 0.5
  - 0.5
  - 0.5
